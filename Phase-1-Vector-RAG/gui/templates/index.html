<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Advisor AI | Multi-Doc RAG</title>
    <!-- CSS: Bootstrap & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --legal-accent: #38bdf8;
            --user-msg: #f1f5f9;
            --ai-msg: #ffffff;
        }

        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar { background: var(--sidebar-bg); color: white; height: 100vh; padding: 20px; border-right: 1px solid #334155; }
        .doc-card { background: #334155; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.85rem; border-left: 4px solid var(--legal-accent); }
        
        /* Chat Area Styling */
        .chat-area { height: 100vh; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
        }

        .message { max-width: 80%; padding: 15px 20px; border-radius: 12px; position: relative; line-height: 1.6; }
        .user-message { 
            align-self: flex-end; 
            background-color: var(--sidebar-bg); 
            color: white; 
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .ai-message { 
            align-self: flex-start; 
            background-color: var(--ai-msg); 
            color: #1e293b; 
            border-bottom-left-radius: 2px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        /* Input Area */
        .input-area { padding: 25px; background: white; border-top: 1px solid #e2e8f0; }
        .custom-input { border-radius: 25px; padding: 12px 25px; border: 1px solid #cbd5e1; transition: 0.2s; }
        .custom-input:focus { box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); border-color: var(--legal-accent); outline: none; }

        /* Loader */
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Document List Scroll */
        #docList { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- Sidebar -->
        <div class="col-md-3 sidebar d-flex flex-column">
            <h4 class="mb-4"><i class="fas fa-scale-balanced text-info me-2"></i> Legal Engine</h4>
            
            <div class="mb-4">
                <label class="form-label small text-uppercase fw-bold text-muted">Upload Documents</label>
                <div class="d-grid">
                    <input type="file" id="fileInput" multiple hidden onchange="handleFileUpload()">
                    <button class="btn btn-outline-light btn-sm p-3" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-file-medical me-2"></i> Add PDF or Word
                    </button>
                </div>
            </div>

            

            <div class="flex-grow-1">
                <label class="form-label small text-uppercase fw-bold text-muted">Knowledge Base</label>
                <div id="docList">
                    <p class="text-muted small italic">No documents indexed yet.</p>
                </div>
            </div>

            <div class="mt-auto pt-3 border-top border-secondary">
                <div class="small text-muted"><i class="fas fa-circle text-success me-1"></i> Phase 1: Vector RAG Active</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="col-md-9 chat-area">
            <div class="chat-header d-flex justify-content-between align-items-center">
                <h5 class="m-0">Legal Consultation Session</h5>
                <button class="btn btn-link text-muted p-0" onclick="location.reload()"><i class="fas fa-rotate me-1"></i> Reset Chat</button>
            </div>

            <div class="chat-container" id="chatBox">
                <div class="ai-message message shadow-sm">
                    Welcome. I am your legal advisory assistant. Please upload any contracts, policies, or legal documents to begin our analysis.
                </div>
            </div>

            <div class="input-area">
                <div class="input-group">
                    <input type="text" id="userInput" class="form-control custom-input" placeholder="Ask a question about your documents...">
                    <button class="btn btn-primary px-4 rounded-pill ms-2" id="sendBtn" onclick="askQuestion()">
                        <span id="btnText">Send</span>
                        <div class="spinner" id="btnLoader"></div>
                    </button>
                </div>
                <p class="text-center text-muted x-small mt-2 mb-0" style="font-size: 0.7rem;">
                    AI can make mistakes. Cross-reference with qualified legal counsel.
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    const md = window.markdownit({ html: true, linkify: true });
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const docList = document.getElementById('docList');
    const sendBtn = document.getElementById('sendBtn');
    const btnLoader = document.getElementById('btnLoader');
    const btnText = document.getElementById('btnText');

    let indexedFiles = [];

    function toggleLoading(isLoading) {
        userInput.disabled = isLoading;
        sendBtn.disabled = isLoading;
        btnLoader.style.display = isLoading ? 'block' : 'none';
        btnText.style.display = isLoading ? 'none' : 'block';
    }

    async function handleFileUpload() {
        const files = document.getElementById('fileInput').files;
        if (files.length === 0) return;

        // Clear "No documents" text if it's the first upload
        if (indexedFiles.length === 0) docList.innerHTML = '';

        for (let file of files) {
            const tempId = 'loader-' + Math.random().toString(36).substr(2, 9);
            docList.innerHTML += `<div class="doc-card" id="${tempId}"><i class="fas fa-spinner fa-spin me-2"></i>Indexing ${file.name}...</div>`;
            
            let formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                if (res.ok) {
                    document.getElementById(tempId).innerHTML = `<i class="fas fa-check-circle text-success me-2"></i> ${file.name}`;
                    indexedFiles.push(file.name);
                } else {
                    document.getElementById(tempId).innerHTML = `<i class="fas fa-exclamation-triangle text-danger me-2"></i> ${file.name} Failed`;
                }
            } catch (e) {
                document.getElementById(tempId).innerHTML = `<i class="fas fa-times-circle text-danger me-2"></i> ${file.name} Error`;
            }
        }
    }

    async function askQuestion() {
        const question = userInput.value.trim();
        if (!question || sendBtn.disabled) return;

        // Add User Message
        chatBox.innerHTML += `<div class="user-message message">${question}</div>`;
        userInput.value = ''; // BLANK textfield immediately
        chatBox.scrollTop = chatBox.scrollHeight;

        toggleLoading(true);

        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question, session_id: 'legal_session_1' })
            });
            const data = await res.json();
            
            // Render Markdown for cleaner AI response
            const formattedAnswer = md.render(data.answer);
            chatBox.innerHTML += `<div class="ai-message message">${formattedAnswer}</div>`;
        } catch (e) {
            chatBox.innerHTML += `<div class="ai-message message text-danger">Communication error with legal engine.</div>`;
        } finally {
            toggleLoading(false);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") askQuestion();
    });
</script>
</body>
</html>
